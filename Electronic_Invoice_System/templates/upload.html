{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-white border-0 text-center pt-4 pb-0">
                <h3 class="fw-bold text-primary">Upload Invoice</h3>
                <p class="text-muted">Supported formats: JPG, PNG, JPEG, PDF</p>
            </div>
            <div class="card-body p-5 text-center">
                <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data" id="uploadForm">
                    
                    <div class="upload-zone p-5 mb-4 border border-2 border-dashed rounded-3 bg-light" id="dropZone">
                        <i class="fa-solid fa-cloud-arrow-up display-4 text-primary mb-3"></i>
                        <h5 class="fw-bold">Drag & Drop your file here</h5>
                        <p class="text-muted small">or</p>
                        <label for="fileInput" class="btn btn-outline-primary rounded-pill px-4">Browse Files</label>
                        <input type="file" id="fileInput" name="file" class="d-none" accept=".jpg,.jpeg,.png,.pdf" required>
                        <p id="fileName" class="mt-3 fw-bold text-success d-none"></p>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm" id="submitBtn" disabled>
                        Process Invoice
                    </button>
                </form>

                <!-- Loading Spinner -->
                <div id="loadingIndicator" class="d-none mt-4">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2 text-muted fw-bold">Processing with EasyOCR... Please wait.</p>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');
        const uploadForm = document.getElementById('uploadForm');
        const loadingIndicator = document.getElementById('loadingIndicator');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                fileNameDisplay.textContent = 'Selected: ' + this.files[0].name;
                fileNameDisplay.classList.remove('d-none');
                submitBtn.disabled = false;
            } else {
                fileNameDisplay.classList.add('d-none');
                submitBtn.disabled = true;
            }
        });

        uploadForm.addEventListener('submit', function() {
            submitBtn.classList.add('d-none');
            loadingIndicator.classList.remove('d-none');
        });
    });
</script>
{% endblock %}
